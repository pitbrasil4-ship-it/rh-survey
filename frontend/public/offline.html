<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Sem conexão · RH Survey</title>
    <style>
      html, body { margin: 0; height: 100%; font-family: system-ui, -apple-system, sans-serif; background: #F8FAFC; color: #0F172A; }
      .wrap { min-height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 24px; gap: 14px; }
      .logo { width: 64px; height: 64px; border-radius: 18px; background: linear-gradient(135deg,#5B21B6,#7C3AED); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 800; font-size: 24px; }
      h1 { font-size: 20px; margin: 6px 0 0; }
      p { font-size: 14px; color: #64748B; margin: 0; max-width: 320px; line-height: 1.5; }
      button { margin-top: 8px; background: linear-gradient(135deg,#5B21B6,#7C3AED); color: #fff; border: 0; border-radius: 12px; padding: 12px 22px; font-size: 14px; font-weight: 700; cursor: pointer; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="logo">RH</div>
      <h1>Você está offline</h1>
      <p>Não foi possível conectar ao RH Survey. Verifique sua internet e tente novamente.</p>
      <button onclick="location.reload()">Tentar de novo</button>
    </div>
  </body>
</html>
