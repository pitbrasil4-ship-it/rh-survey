<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Sem conexão · RH Survey</title>
    <style>
      html, body { margin: 0; height: 100%; font-family: system-ui, -apple-system, sans-serif; background: #F8FAFC; color: #0F172A; }
      .wrap { min-height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 24px; gap: 14px; }
      .logo { width: 64px; height: 64px; display: block; margin: 0 auto; }
      h1 { font-size: 20px; margin: 6px 0 0; }
      p { font-size: 14px; color: #64748B; margin: 0; max-width: 320px; line-height: 1.5; }
      button { margin-top: 8px; background: linear-gradient(135deg,#5B21B6,#7C3AED); color: #fff; border: 0; border-radius: 12px; padding: 12px 22px; font-size: 14px; font-weight: 700; cursor: pointer; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <svg class="logo" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-label="RH Survey">
        <defs>
            <linearGradient id="lbg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#1E1B4B"/><stop offset="1" stop-color="#312E81"/></linearGradient>
            <linearGradient id="lr" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#DC2626"/><stop offset="1" stop-color="#EF4444"/></linearGradient>
          </defs>
          <rect width="64" height="64" rx="15" fill="url(#lbg)"/>
          <g transform="translate(6.2,12.1) scale(0.76)" stroke-linecap="round" stroke-linejoin="round" fill="none">
            <path d="M26 18 L30 46 L34 33 L44 33 L63 33" stroke="url(#lr)" stroke-width="2.5" opacity="0.4"/>
            <path d="M5 36 L14 36 L18 27 L22 46 L26 18" stroke="url(#lr)" stroke-width="2.5"/>
            <line x1="26" y1="18" x2="26" y2="30" stroke="#EF4444" stroke-width="2.5"/>
            <path d="M20 23 L26 20 L32 23" stroke="#EF4444" stroke-width="2.5"/>
            <line x1="26" y1="30" x2="22" y2="40" stroke="#EF4444" stroke-width="2.5"/>
            <line x1="26" y1="30" x2="30" y2="40" stroke="#EF4444" stroke-width="2.5"/>
            <circle cx="26" cy="12" r="5.5" fill="#EF4444"/>
          </g>
      </svg>
      <h1>Você está offline</h1>
      <p>Não foi possível conectar ao RH Survey. Verifique sua internet e tente novamente.</p>
      <button onclick="location.reload()">Tentar de novo</button>
    </div>
  </body>
</html>
